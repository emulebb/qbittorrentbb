name: Build - Windows (folder)

# Produces a qBittorrentBB folder build like upstream qBittorrent: qbittorrent.exe
# plus its runtime DLLs (Qt6 via aqt + OpenSSL/zlib/libtorrent) and the Qt plugins,
# zipped with a manifest + SBOM. This deliberately avoids the fully-static
# single-exe path (vcpkg static Qt6 is a multi-hour rabbit hole and upstream
# qBittorrent itself ships a folder, not a single static exe).
#
# Requires an org-scoped token (secrets.EMULEBB_CI_PAT) for the sibling private
# forks emulebb-libtorrent and emulebb-build.

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Package version: MAJOR.MINOR.PATCH[-suffix]"
        required: false
        default: "0.0.0-dev"
  # Reusable: release.yml calls this on a v* tag, then publishes the artifact as a
  # GitHub Release. Kept separate from the push trigger because a `paths` filter
  # would wrongly evaluate against the tag commit's parent and could skip the build.
  workflow_call:
    inputs:
      release_version:
        description: "Package version: MAJOR.MINOR.PATCH[-suffix]"
        required: false
        type: string
        default: "0.0.0-dev"
    secrets:
      EMULEBB_CI_PAT:
        required: true
  push:
    branches: [master]
    # Build automatically on real code changes (not docs / the workflow itself).
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "cmake/**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  build:
    name: Windows folder build (x64)
    runs-on: windows-2022
    timeout-minutes: 120
    permissions:
      actions: write  # vcpkg GHA binary cache (x-gha)

    env:
      triplet: x64-windows  # dynamic deps for libtorrent (boost/openssl/zlib)

    steps:
      - name: Resolve output root
        run: echo "OUTPUT_ROOT=$env:RUNNER_TEMP\emulebb_out" >> $env:GITHUB_ENV

      - name: Setup MSVC dev environment
        # Puts the MSVC toolchain (incl. dumpbin, used by the packager) on PATH.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Checkout qbittorrentbb
        uses: actions/checkout@v4
        with:
          path: qbittorrentbb
          persist-credentials: false

      - name: Checkout emulebb-libtorrent
        uses: actions/checkout@v4
        with:
          repository: emulebb/emulebb-libtorrent
          ref: RC_2_0
          submodules: recursive
          token: ${{ secrets.EMULEBB_CI_PAT }}
          path: emulebb-libtorrent
          persist-credentials: false

      - name: Checkout emulebb-build
        uses: actions/checkout@v4
        with:
          repository: emulebb/emulebb-build
          token: ${{ secrets.EMULEBB_CI_PAT }}
          path: emulebb-build
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install emule_workspace
        run: pip install .\emulebb-build

      - name: Install Qt (dynamic, aqt)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.1"
          arch: win64_msvc2022_64
          archives: qtbase qtsvg qttools
          modules: qtimageformats
          cache: true

      # https://learn.microsoft.com/en-us/vcpkg/users/binarycaching#gha
      - name: Set up vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', (process.env.ACTIONS_CACHE_URL || ''));
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', (process.env.ACTIONS_RUNTIME_TOKEN || ''));

      - name: Install engine deps with vcpkg (boost/openssl/zlib)
        run: |
          $env:VCPKG_BINARY_SOURCES = "clear;x-gha,readwrite"
          $packages = @(
            "openssl",
            "zlib",
            "boost-asio",
            "boost-system",
            "boost-optional",
            "boost-variant",
            "boost-multiprecision",
            "boost-multi-index",
            "boost-crc",
            "boost-smart-ptr",
            "boost-utility",
            "boost-predef",
            "boost-logic",
            "boost-range",
            "boost-pool",
            "boost-intrusive",
            "boost-functional",
            "boost-date-time",
            "boost-circular-buffer",
            "boost-stacktrace"
          )
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            --triplet $env:triplet `
            --clean-after-build `
            $packages

      - name: Build qbittorrent.exe (dynamic Qt + libtorrent)
        env:
          EMULEBB_QBT_REPO: ${{ github.workspace }}\qbittorrentbb
          EMULEBB_LIBTORRENT_REPO: ${{ github.workspace }}\emulebb-libtorrent
          EMULEBB_WORKSPACE_OUTPUT_ROOT: ${{ env.OUTPUT_ROOT }}
        run: |
          # VCPKG_INSTALLATION_ROOT is a runner OS env var (not the workflow env
          # context), so wire VCPKG_ROOT here for emule_workspace's toolchain lookup.
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          $env:EMULEBB_QT_PREFIX = $env:Qt_ROOT_DIR
          python -m emule_workspace build qbittorrentbb-ci --dynamic

      - name: Dump build logs on failure
        if: failure()
        run: |
          $logRoot = "$env:OUTPUT_ROOT\logs"
          if (Test-Path $logRoot) {
            Get-ChildItem -Recurse -Filter *.log $logRoot | ForEach-Object {
              Write-Host "===== $($_.FullName) ====="
              Get-Content $_.FullName -Tail 250
            }
          }

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ env.OUTPUT_ROOT }}\logs
          if-no-files-found: ignore

      - name: "Package (folder ZIP + manifest + SBOM, unsigned)"
        env:
          EMULEBB_QBT_REPO: ${{ github.workspace }}\qbittorrentbb
          EMULEBB_LIBTORRENT_REPO: ${{ github.workspace }}\emulebb-libtorrent
          EMULEBB_WORKSPACE_OUTPUT_ROOT: ${{ env.OUTPUT_ROOT }}
        run: |
          $env:EMULEBB_QT_PREFIX = $env:Qt_ROOT_DIR
          python -m emule_workspace package-qbittorrentbb `
            --release-version "${{ inputs.release_version || '0.0.0-dev' }}" `
            --clean

      - name: Verify the package has the runtime it needs
        run: |
          $stage = Get-ChildItem -Recurse -Directory "$env:OUTPUT_ROOT\release" -Filter qBittorrentBB | Select-Object -First 1
          if (-not $stage) { throw "staged qBittorrentBB folder not found" }
          $root = $stage.FullName
          $required = @(
            "qbittorrent.exe", "Qt6Core.dll", "Qt6Widgets.dll", "Qt6Network.dll",
            "torrent-rasterbar.dll", "qt.conf",
            "plugins\platforms\qwindows.dll", "plugins\sqldrivers\qsqlite.dll"
          )
          $missing = $required | Where-Object { -not (Test-Path (Join-Path $root $_)) }
          if ($missing) { throw "package is missing required runtime: $($missing -join ', ')" }
          Write-Host "OK: folder package has exe + Qt runtime + plugins."

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: qbittorrentbb-windows-x64
          path: |
            ${{ env.OUTPUT_ROOT }}\release\**\*.zip
            ${{ env.OUTPUT_ROOT }}\release\**\*.manifest.json
            ${{ env.OUTPUT_ROOT }}\release\**\*.sbom.spdx.json
          if-no-files-found: error
