name: Release - Windows (folder)

# Publishes a qBittorrentBB folder build as a GitHub Release when a v* tag is
# pushed. The build itself is the reusable build-static.yml workflow, so the CI
# and release paths share one recipe. Tag form: v<MAJOR>.<MINOR>.<PATCH>[-suffix]
# (a -suffix, e.g. v0.7.3-rc2, is published as a pre-release).

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.v.outputs.release_version }}
    steps:
      - id: v
        run: |
          ref="${{ github.ref_name }}"
          echo "release_version=${ref#v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      release_version: ${{ needs.version.outputs.release_version }}
    secrets: inherit

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: qbittorrentbb-windows-x64
          path: dist

      - name: Create GitHub Release (unsigned artifacts)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s globstar nullglob
          assets=(dist/**/*.zip dist/**/*.manifest.json dist/**/*.sbom.spdx.json)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "no release assets found under dist/" >&2
            exit 1
          fi
          prerelease=""
          case "${{ github.ref_name }}" in
            *-*) prerelease="--prerelease" ;;
          esac
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "qBittorrentBB ${{ github.ref_name }}" \
            --generate-notes \
            $prerelease \
            "${assets[@]}"
